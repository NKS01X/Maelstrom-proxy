syntax = "proto3";

package kind;

service KindService {
    rpc Watch(WatchRequest) returns (stream WatchResponse);
    rpc Put(PutRequest) returns (PutResponse);
}

message WatchRequest {
    string prefix = 1;
}

message WatchResponse {
    string operation_type = 1;
    string key = 2;
    bytes new_value = 3;
}

message PutRequest {
    string key = 1;
    bytes value = 2;
}

message PutResponse {
    bool success = 1;
}
